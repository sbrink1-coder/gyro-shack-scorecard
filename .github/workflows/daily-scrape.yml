name: Daily Scorecard Scrape

on:
  workflow_dispatch: # Allow manual runs
  schedule:
    - cron: "0 10 * * *" # 4:00 AM MST is 10:00 AM UTC

permissions:
  contents: write  # Required to push updated scorecard_data.json back to the repo

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          playwright install --with-deps chromium

      - name: Run data collection script
        timeout-minutes: 15
        env:
          SQUARE_ACCESS_TOKEN: ${{ secrets.SQUARE_ACCESS_TOKEN }}
          QU_USERNAME: ${{ secrets.QU_USERNAME }}
          QU_PASSWORD: ${{ secrets.QU_PASSWORD }}
          PYTHONUNBUFFERED: "1"
        run: |
          python collect_data.py 2>&1 | tee /tmp/scrape_debug.log
          echo "Exit code: $?"
          echo "=== SCORECARD DATA ==="
          cat data/scorecard_data.json

      - name: Upload debug log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scrape-debug-log
          path: /tmp/scrape_debug.log
          retention-days: 3

      - name: Commit and push if data changed
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "action@github.com"
          git add data/scorecard_data.json
          # Check if there are changes to commit
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "📊 Update daily scorecard data"
            git push
          fi
